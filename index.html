<!DOCTYPE html>

  <script src="https://cdn.tailwindcss.com"></script>

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system_ui, sans-serif; }
    .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .card-hover:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen pb-20">
  <div class="max-w-4xl mx-auto px-6 py-12">
    <!-- HERO -->
    <div class="text-center mb-16">
      <div class="inline-flex items-center gap-3 bg-yellow-500/10 text-yellow-400 px-6 py-2 rounded-3xl mb-6">
        <i class="fa-solid fa-baby text-2xl"></i>
        <span class="font-semibold tracking-widest">NEWBORN MODE ACTIVATED</span>
      </div>
      <h1 class="text-6xl md:text-7xl font-bold tracking-tighter mb-4">Tanious Family<br>Meal Train 🍼</h1>
      <p class="text-2xl text-zinc-400 max-w-md mx-auto">16 chef-made CookUnity meals per week while we soak in all the newborn snuggles</p>
      <a href="https://www.cookunity.com/gift-cards" target="_blank" 
         class="mt-8 inline-flex items-center gap-3 bg-white text-zinc-900 px-8 py-4 rounded-2xl font-semibold text-lg hover:bg-amber-400 transition">
        <i class="fa-solid fa-gift"></i> Buy a Gift Card for Us
      </a>
    </div>

    <!-- STATS -->
    <div class="grid grid-cols-3 gap-6 mb-16" id="stats">
      <!-- JS fills this -->
    </div>

    <!-- WEEKS -->
    <h2 class="text-3xl font-semibold mb-8 flex items-center gap-3">
      <i class="fa-solid fa-calendar text-amber-400"></i> Upcoming Weeks
    </h2>
    <div class="grid md:grid-cols-2 gap-6" id="weeks-grid">
      <!-- JS fills this -->
    </div>

    <!-- RECENT GIFTS -->
    <div class="mt-20">
      <h2 class="text-3xl font-semibold mb-8 flex items-center gap-3">
        <i class="fa-solid fa-heart text-rose-400"></i> Community Love
      </h2>
      <div class="space-y-4" id="gifts-list">
        <!-- JS fills this -->
      </div>
    </div>

    <!-- FLOATING BUTTON -->
    <button onclick="openModal()" 
            class="fixed bottom-8 right-8 bg-gradient-to-r from-amber-400 to-yellow-500 text-zinc-900 font-bold text-xl px-10 py-6 rounded-3xl shadow-2xl flex items-center gap-4 hover:scale-105 transition">
      <i class="fa-solid fa-gift text-3xl"></i>
      <span>I Bought a Gift Card!</span>
    </button>
  </div>

  <!-- MODAL -->
  <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl max-w-md w-full mx-4 overflow-hidden">
      <div class="p-8">
        <h3 class="text-3xl font-semibold mb-8">Tell us about your gift card ❤️</h3>
        <form id="gift-form" class="space-y-6">
          <div>
            <label class="block text-sm text-zinc-400 mb-2">Your name</label>
            <input id="name" type="text" required class="w-full bg-zinc-800 rounded-2xl px-6 py-5 outline-none focus:ring-2 focus:ring-amber-400">
          </div>
          <div>
            <label class="block text-sm text-zinc-400 mb-2">Gift card amount ($)</label>
            <input id="amount" type="number" min="5" required class="w-full bg-zinc-800 rounded-2xl px-6 py-5 outline-none focus:ring-2 focus:ring-amber-400">
          </div>
          <div>
            <label class="block text-sm text-zinc-400 mb-2">Message (optional)</label>
            <textarea id="message" rows="3" class="w-full bg-zinc-800 rounded-3xl px-6 py-5 outline-none focus:ring-2 focus:ring-amber-400"></textarea>
          </div>
          <div>
            <label class="block text-sm text-zinc-400 mb-2">Your email (for thank you note)</label>
            <input id="email" type="email" class="w-full bg-zinc-800 rounded-2xl px-6 py-5 outline-none focus:ring-2 focus:ring-amber-400">
          </div>
          <button type="submit"
                  class="w-full bg-gradient-to-r from-amber-400 to-yellow-500 text-zinc-900 py-6 rounded-2xl font-bold text-xl">
            Send the Love!
          </button>
        </form>
      </div>
      <button onclick="closeModal()" class="w-full py-6 text-zinc-400 hover:text-white border-t border-zinc-700">Cancel</button>
    </div>
  </div>

<script>
  // Global so onclick="openModal()" works
  function openModal() {
    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('gift-form').reset();
  }

  function closeModal() {
    document.getElementById('modal').classList.add('hidden');
  }

  document.addEventListener('DOMContentLoaded', function() {
    // ================== CONFIG ==================
    const WEEKLY_GOAL = 184;
    const START_DATE = new Date('2026-03-03');   // change if needed
    const MEAL_PRICE = 11.50;
    const TODAY = new Date();

    // PASTE YOUR FIREBASE CONFIG HERE
    const firebaseConfig = {
      apiKey: "AIzaSyBloBRD91EW1-jU8pUmxcftKk1xCTTTw34",
      authDomain: "ezra-tanious-mealtrain.firebaseapp.com",
      databseURL: "https://console.firebase.google.com/project/ezra-tanious-mealtrain/database/ezra-tanious-mealtrain-default-rtdb/data/~2F",
      projectId: "ezra-tanious-mealtrain",
      storageBucket: "ezra-tanious-mealtrain.firebasestorage.app",
      messagingSenderId: "747585011658",
      appId: "1:747585011658:web:43a768395c1c1f96261933"
    };

    // PASTE YOUR EMAILJS INFO HERE (from step 5)
    const EMAILJS_PUBLIC_KEY = "GP8eubCbTNFUovR-9";
    const EMAILJS_SERVICE_ID = "service_875q8ch";
    const EMAILJS_TEMPLATE_ID = "template_cmu2vvd";

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const contributionsRef = db.ref('contributions');

    let contributions = [];

function loadData() {
  contributionsRef.on('value', (snapshot) => {
    console.log('Snapshot received. Has children?', snapshot.hasChildren());
    console.log('Number of children:', snapshot.numChildren());
    
    contributions = [];
    snapshot.forEach(child => {
      const val = child.val();
      console.log('Child key:', child.key, 'Value:', val);  // log each one
      if (val) contributions.push(val);
    });
    
    console.log('Final contributions array:', contributions);
    contributions.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
    console.log('After sort:', contributions);
    
    renderAll();
  });
}

    function addContribution(data) {
      data.timestamp = Date.now();
      contributionsRef.push(data)
        .then(() => {
          console.log('Gift pushed successfully!', data);  // debug
        })
        .catch(error => {
          console.error('Push failed:', error);  // will show permission or other errors
        });
    }

    function calculateTotalFunded() {
      return contributions.reduce((sum, c) => sum + parseFloat(c.amount || 0), 0);
    }

    function generateWeeks() {
      const totalFunded = calculateTotalFunded();
      const weeks = [];
      let current = new Date(START_DATE);
      let remainingFunds = totalFunded;

      for (let i = 0; i < 12; i++) {
        const weekStart = new Date(current);
        current.setDate(current.getDate() + 6);
        const weekEnd = new Date(current);
        current.setDate(current.getDate() + 1);

        const isPast = weekEnd < TODAY;
        const isCurrent = !isPast && weekStart <= TODAY && weekEnd >= TODAY;
        const isFuture = weekStart > TODAY;

        let allocated = 0;
        let status = 'open';
        let progressPercent = 0;

        // ONLY allocate to FUTURE weeks (past + current are locked)
        if (isFuture && remainingFunds > 0) {
          if (remainingFunds >= WEEKLY_GOAL) {
            allocated = WEEKLY_GOAL;
            remainingFunds -= WEEKLY_GOAL;
            status = 'funded';
          } else {
            allocated = remainingFunds;
            remainingFunds = 0;
            status = 'partial';
          }
          progressPercent = Math.round((allocated / WEEKLY_GOAL) * 100);
        }

        weeks.push({
          week: i + 1,
          startStr: weekStart.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }),
          endStr: weekEnd.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }),
          isPast,
          isCurrent,
          isFuture,
          status,
          allocated,
          progressPercent
        });
      }
      return weeks;
    }

    function calculateStats(weeks) {
      const total = calculateTotalFunded();
      const funded = weeks.filter(w => w.status === 'funded').length;
      const partial = weeks.find(w => w.status === 'partial');
      const weeksCovered = funded + (partial ? partial.allocated / WEEKLY_GOAL : 0);
      const totalMeals = Math.floor(total / MEAL_PRICE);
      return { total: total.toFixed(0), weeksCovered: weeksCovered.toFixed(1), totalMeals };
    }

    function renderAll() {
      const weeks = generateWeeks();
      const stats = calculateStats(weeks);

      // Stats
      document.getElementById('stats').innerHTML = `
        <div class="bg-zinc-900 rounded-3xl p-8 text-center card-hover">
          <p class="text-amber-400 text-sm font-medium">TOTAL FUNDED</p>
          <p class="text-6xl font-bold mt-2">$${stats.total}</p>
        </div>
        <div class="bg-zinc-900 rounded-3xl p-8 text-center card-hover">
          <p class="text-amber-400 text-sm font-medium">WEEKS COVERED</p>
          <p class="text-6xl font-bold mt-2">${stats.weeksCovered}</p>
        </div>
        <div class="bg-zinc-900 rounded-3xl p-8 text-center card-hover">
          <p class="text-amber-400 text-sm font-medium">MEALS FUNDED</p>
          <p class="text-6xl font-bold mt-2">${stats.totalMeals}</p>
        </div>
      `;

      // Weeks grid
      const weeksHTML = weeks.map(w => {
        let badge = '';
        let barClass = 'bg-zinc-700 w-0';
        let extraClass = (w.isPast || w.isCurrent) ? 'opacity-70' : '';

        if (w.isPast || w.isCurrent) {
          badge = `<span class="bg-zinc-700 px-4 py-1 rounded-2xl text-sm font-medium">${w.isCurrent ? 'Current 🔥 (locked)' : 'Past'}</span>`;
        } else if (w.status === 'funded') {
          badge = `<span class="bg-emerald-500/20 text-emerald-400 px-4 py-1 rounded-2xl text-sm font-medium">✓ Fully Funded</span>`;
          barClass = 'bg-emerald-400 w-full';
        } else if (w.status === 'partial') {
          badge = `<span class="bg-amber-400/20 text-amber-400 px-4 py-1 rounded-2xl text-sm font-medium">Partial • $${Math.round(w.allocated)} raised</span>`;
          barClass = 'bg-amber-400';
        } else {
          badge = `<span class="bg-zinc-700 px-4 py-1 rounded-2xl text-sm font-medium">Waiting for love</span>`;
        }

        return `
          <div class="bg-zinc-900 rounded-3xl p-8 card-hover ${extraClass}">
            <div class="flex justify-between items-start mb-6">
              <div>
                <p class="text-xl font-semibold">Week ${w.week}${w.isCurrent ? ' (current)' : ''}${w.isPast ? ' (past)' : ''}</p>
                <p class="text-zinc-400">${w.startStr} — ${w.endStr}</p>
              </div>
              ${badge}
            </div>
            <div class="h-3 bg-zinc-800 rounded-3xl overflow-hidden">
              <div class="h-full transition-all duration-500 ${barClass}" style="width: ${w.progressPercent}%"></div>
            </div>
            <p class="text-center text-sm text-zinc-500 mt-3">16 chef meals • $${WEEKLY_GOAL}</p>
          </div>
        `;
      }).join('');
      document.getElementById('weeks-grid').innerHTML = weeksHTML;

      // Gifts list
      const giftsHTML = contributions.slice(0, 8).map(c => `
        <div class="bg-zinc-900 rounded-3xl p-6 flex gap-6 card-hover">
          <div class="w-12 h-12 bg-gradient-to-br from-amber-400 to-yellow-500 rounded-2xl flex items-center justify-center text-2xl flex-shrink-0">🎁</div>
          <div class="flex-1">
            <div class="flex justify-between">
              <p class="font-semibold">${c.name}</p>
              <p class="font-mono text-amber-400">+$${parseFloat(c.amount).toFixed(0)}</p>
            </div>
            ${c.message ? `<p class="text-zinc-400 mt-2 italic">"${c.message}"</p>` : ''}
            <p class="text-xs text-zinc-500 mt-3">${new Date(c.timestamp).toLocaleDateString()}</p>
          </div>
        </div>
      `).join('');
      document.getElementById('gifts-list').innerHTML = giftsHTML || '<p class="text-zinc-500 text-center py-12">Be the first to gift a meal ❤️</p>';
    }

    // Form submit
    document.getElementById('gift-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const data = {
        name: document.getElementById('name').value,
        amount: parseFloat(document.getElementById('amount').value),
        message: document.getElementById('message').value,
        email: document.getElementById('email').value
      };

      addContribution(data);
      renderAll();  // force immediate re-render in case listener lags
      confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });

      if (data.email && EMAILJS_PUBLIC_KEY !== "YOUR_PUBLIC_KEY") {
        try {
          await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
            name: data.name,
            amount: data.amount,
            message: data.message || "No message left — still means the world!"
          });
        } catch(e) {}
      }

      closeModal();

      const toast = document.createElement('div');
      toast.className = "fixed bottom-28 right-8 bg-emerald-600 text-white px-8 py-4 rounded-2xl shadow-xl";
      toast.textContent = "Thank you!! 🎉 Live on the board";
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    });

    loadData();
  });
</script>
